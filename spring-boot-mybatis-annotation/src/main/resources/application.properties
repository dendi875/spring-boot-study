server.port=9090
mybatis.type-aliases-package=com.zq.model

# Spring Boot 会自动加载 spring.datasource.* 相关配置，
# 数据源就会自动注入到 sqlSessionFactory 中，sqlSessionFactory 会自动注入到 Mapper 中，对了，
# 你一切都不用管了，直接拿起来使用就行了。
spring.datasource.url=jdbc:mysql://www.myvbox.com:3306/mybatis?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver